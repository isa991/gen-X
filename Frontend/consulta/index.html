<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Consulta</title>
</head>
<body>
    <form id="consulta" method="post" data-api-endpoint="http://127.0.0.1:8000/api/adicionar-historico-de-consulta/" onsubmit="sendInfo(event)">
        <fieldset>
            <label for="data_de_consulta">Data:</label>
            <input type="date" id="data_de_consulta" name="data_de_consulta" value="2026-05-18">
            <br>

            <label for="paciente">CPF do paciente:</label>
            <input type="text" id="paciente" name="paciente" value="44455577767">
            <br>
            
            <label for="responsavel">CPF do responsavel:</label>
            <input type="text" id="responsavel" name="responsavel" value="78912832134">
            <br>
            
            <label for="medico">ID do médico:</label>
            <input type="number" id="medico" name="medico" value="1">
            <br>
        </fieldset>

        <fieldset id="sintomas">
            <p>Sintomas:</p>
        </fieldset>

        <input type="submit" value="submit">
    </form>

    <script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                // Does this cookie string begin with the name we want?
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    fetch('http://127.0.0.1:8000/api/sintomas/')
        .then(response => response.json())
        .then(data => {
            const sintomasList = document.getElementById('sintomas');
            data.forEach(S => {
                const listItem = document.createElement('input');
                listItem.type = 'checkbox';
                listItem.id = S.sintoma;
                listItem.value = S.sintoma;
                sintomasList.appendChild(listItem);

                const label = document.createElement('label');
                label.htmlFor = S.sintoma;
                label.textContent = S.sintoma;
                sintomasList.appendChild(label);

                sintomasList.appendChild(document.createElement('br'));
            });
        })
        .catch(error => console.error('Erro ao pegar os sintomas:', error));
        
    function sendInfo(event) {
        event.preventDefault();
        
        const form = event.target;
        const apiEndpoint = form.getAttribute('data-api-endpoint');

        const selected = Array.from(form.querySelectorAll('#sintomas input[type="checkbox"]:checked')).map(cb => cb.value).join(', ');
        
        const payload = {
            data_de_consulta: form.data_de_consulta.value,
            paciente: form.paciente.value,
            responsavel: form.responsavel.value,
            medico: parseInt(form.medico.value),
            sintomas_table: {
                sintomas: selected
            }
        };

        console.log(JSON.stringify(payload))

        const csrftoken = getCookie('csrftoken');

        // 2. Send the Data via Fetch
        fetch(apiEndpoint, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrftoken
            },
            body: JSON.stringify(payload) // Send the JSON payload
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(error => {
                    throw new Error(error.detail || 'Submission failed');
                });
            }
            return response.json();
        })
        .then(data => {
            console.log('Success:', data);
            alert('Item saved successfully!');
            form.reset(); 
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error saving item: ' + error.message);
        });
    }
    </script>
</body>
</html>
