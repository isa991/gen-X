<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintomas</title>
</head>
<body>
    <h1>Sintomas da Sindrome do X frágil</h1>
    <div id="sintomas"></div>
    <button>Mostrar Selecionados</button>
    <p id="output"></p>

    <script>
        fetch('http://127.0.0.1:8000/api/sintomas/')
            .then(response => response.json())
            .then(data => {
                const sintomasList = document.getElementById('sintomas');
                data.forEach(S => {
                    const listItem = document.createElement('input');
                    listItem.type = 'checkbox';
                    listItem.value = S.sintoma;
                    sintomasList.appendChild(listItem);

                    const label = document.createElement('label');
                    label.htmlFor = S.sintoma;
                    label.textContent = S.sintoma;
                    sintomasList.appendChild(label);

                    sintomasList.appendChild(document.createElement('br'));
                });
            })
            .catch(error => console.error('Erro ao pegar os sintomas:', error));
        
        document.querySelector('button').addEventListener('click', function(event) {
            const selectedSintomas = Array.from(document.querySelectorAll('#sintomas input[type="checkbox"]:checked')).map(cb => cb.value);

            let output = selectedSintomas.join(', ');

            document.getElementById('output').textContent = output;
        })
    </script>
</body>
</html>
