<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="http://localhost:8000/api/cadastro-paciente/" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br>
        <label for="CPF_Paciente">CPF:</label>
        <input type="text" id="CPF_Paciente" name="CPF_Paciente" required>
        <br>
        <label for="data_de_nascimento">Data de Nascimento:</label>
        <input type="date" id="data_de_nascimento" name="data_de_nascimento" required>
        <br>
        <label for="sexo">sexo:</label>
        <select id="sexo" name="sexo" required>
            <option value="">Selecione</option>
            <option value="Masculino">Masculino</option>
            <option value="Feminino">Feminino</option>
        </select>
        <br>
        <button type="submit">Cadastrar</button>
    </form>

    <script>
        document.querySelector('button[type="submit"]').addEventListener('click', () => {
            alert('Paciente cadastrado com sucesso!')
        })
    </script>
</body>
</html>
